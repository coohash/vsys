l7_inter_transfers = 3000

# L8 层级：核心大蓄水总池最终物理地址容积总量 (对应 L8.csv 行数，长效保护不执行余额清扫)
l8_total_pool_size = 30000

[terminal_b_matrix]
# 核心规则13：终端 B 动态沙漏状态机守护进程核心配置指标
target_amount_m = 1000000.0        # 本次最终归集渗透出场的目标总金额 M (单位: VSYS)
target_address_n = 200             # 本次精确定位使用的出场物理通道数量 N

# 宏观财务对账截断容差控制
macro_error_margin = 0.01          # 最终总额与 M 的允许累计统计学对账误差（0.01 = 1%）
l9_target_random_range = 0.20      # L9 分配期望时的非整数上下权重离散随机振幅（0.20 = ±20%）

# 核心规则9：从 L8 水库大总池执行异步非线性抽水泵送时，单次榨取原地址可用余额的百分比范围
l8_extract_rate_min = 0.20
l8_extract_rate_max = 0.50

# 核心规则9/10：状态机调度进程轮询整个 L9-L14 资金池 Loop 循环之间的异步随机睡眠延迟（单位：秒）
loop_delay_min = 2.0
loop_delay_max = 13.0

# 局部层级混淆摩擦强度设置（基于出场通道数 N 的倍数动态扩展可调）
l10_inter_transfer_multiplier = 10   # L10 内部同层无序盲转次数 = 10 * N (即 2000 次)
l11_inter_transfer_multiplier = 40   # L11 内部同层高速互转次数 = 40 * N (即 8000 次)
l13_inter_transfer_multiplier = 320  # L13 内部高密摩擦洗净次数 = 320 * N (即 64000 次)
l13_burn_txs = 500                   # L13 内部对流中向黑洞抛洒微额噪点的动作次数

# 逆流回灌蓄水阀与非对称顺流下泄静态比例系数
l10_backflow_rate_to_l8 = 0.20       # L10 异步回拨至 L8 总池的累计资金占入金总量的比例
l11_backflow_rate_to_l8 = 0.20       # L11 异步回拨至 L8 总池的累计资金占入金总量的比例
l12_leak_rate_to_l15 = 0.30          # L12 跨层打破常规、横向直接渗出注入最终终点港 L15的比例
l12_forward_rate_to_l13 = 0.70       # L12 顺流正常重力下泄至 L13 缓冲层的比例
l13_leak_rate_to_l15 = 0.50          # L13 再次横向直接剥离渗出、滑入最终终点港 L15的比例
l13_forward_rate_to_l14 = 0.50       # L13 顺流正常重力下泄至 L14 漩涡矩阵的比例

# 核心规则14：L14 漩涡矩阵强力多路径逆流举升概率参数（分配权重合计必须等于 1.0 闭环）
l14_leak_path_a_rate = 0.20          # 路径A: 顺流最后一步前行，直接滑入终点港 L15 的概率
l14_vortex_path_b_rate = 0.60        # 路径B: 一级漩涡重力逆流举升，强行退回推返 L13 的概率
l14_vortex_path_c_rate = 0.20        # 路径C: 二级漩涡跨级逆流举升，强行重力逆转退回 L12 的概率

[convergence_conditions]
# 核心规则11：两极平滑收敛退出机制阈值
# 条件一：中间缓冲层级 (L12+L13+L14) 在线账面总余额低于此界限（资产已被高频颠簸完全甩干），打印 [渗透完毕] 并安全退出 (VSYS)
dry_pool_threshold_vsys = 1000.0
# 条件二：L15 终点渗透接收总港累计到账量占总目标 M 的宏观百分比线，达到后判定完成，平滑断开 Loop 退出
completion_rate_trigger = 0.96
