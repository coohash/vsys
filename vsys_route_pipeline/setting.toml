[terminal_a_topology]
# 终端 A 线性级联裂变推进期间，单步原子划转动作之间的随机延迟时间间隔（单位：秒）
interval_min = 1.0
interval_max = 4.0

# L1 层级：初始裂变目标物理路径数量 (对应 L1.csv 行数)
