# ==============================================================================
# 💡 VSYS Blockchain Asset Route Pipeline - Production Configuration Matrix
# 文件名: setting.toml
# 描述: 资产自动化路由与非线性管道流转全量配置文件（全数字、全时序可调）
# ==============================================================================

[network_core]
# VSYS 区块链节点 RPC API 路由地址
node_url = "http://127.0.0.1:9922"
# 网络物理标识：'M' 代表主网 (Mainnet)，'T' 代表测试网 (Testnet)
network_byte = "M"
# VSYS 底层原生交易标准固定手续费 (0.1 VSYS = 10,000,000 Satoshi)
base_fee_satoshi = 10000000
# 费率比例 (Fee Scale)，底层字节序列化硬编码固定为 100
fee_scale = 100
# 异步高并发网络请求限制（理想区间 3 - 15）
concurrency_limit = 2
# 网络请求暂态失败后，异步重试延迟时间范围（单位：秒）
retry_delay_min = 0.5
retry_delay_max = 2.0

[control_gating]
# 核心规则12：是否强制只运行终端 B 守护进程 (true: 直接启动沙漏 ； false: 执行A后自动转B)
only_run_b = false
# 核心规则6：初始入金前置拦截安全冗余系数 (判断: 初始入金 > 预留粉尘总额 + 预估手续费总额 * 冗余系数)
safety_redundancy_factor = 1.5
# 核心规则8：队列错误隔离保护，单步动作报错跳过后，自动下一步之前的安全冷却间隔（单位：秒）
error_skip_delay_min = 3.0
error_skip_delay_max = 5.0

[l0_root_account]
# 核心 L0 根资产初始入金物理地址与离线私钥
address = "ARRfwY4cJNJBBHjHxKm5YVbuUSPvvV2WdMR"
private_key = "3kFxJqep9y4qcBLuaSTRqLgqzQZwVZ9mCxCp5FwCyn6Z"
# 核心规则13：初始默认注入资产规模总额 (单位: VSYS)
initial_balance_vsys = 2000000.0

[dust_policy]
# 核心规则2：各中间流转临时账户（除L8, L15外）执行清扫时，物理强制留存的随机粉尘资产范围 (单位: VSYS)
min_dust_vsys = 1.0
max_dust_vsys = 10.0

[burn_interference]
